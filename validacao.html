<!DOCTYPE html>
<html lang="pt-br">
</head>

<meta charset="UTF-8">
<title>Validação Interativa de Formulário</title>
<link rel="stylesheet" href="validacao.css">
</head>

<body>

<form id="meuForm">
<h1>Formulário</h1>

<label for="campoNome">Nome:</label>
<input type="text" id="campoNome" placeholder="Digite o nome" required><br>

<label for="seuEmail">Email:</label>
<input type="email" id="email" placeholder="Digite seu email" required><br>

<label for="number">Idade:</label>
<input type="number" id="idade" placeholder="Digite sua idade" min="0"required><br>
<button type="submit">Enviar</button>

</form>

<p id="erro"></p>

<script src="validacao.js"></script>


</body>
</html>
